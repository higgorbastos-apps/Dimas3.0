<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#080705" />
    <meta name="description" content="Seu diretor musical pessoal — curadoria de repertório, setlists e estratégia de carreira." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Diretor" />

    <title>Diretor Musical</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Ícones -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/dm-icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/dm-icon-192.png" />
  </head>
  <body>
    <noscript>Habilite o JavaScript para usar este app.</noscript>
    <div id="root"></div>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
